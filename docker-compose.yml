version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mfv2-postgres
    environment:
      # No hardcoded secrets. Provide these via a compose .env file or the
      # shell environment. DATABASE_PASSWORD is required (fail-closed).
      POSTGRES_USER: ${DATABASE_USER:-moneyflow}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:-moneyflow_dev}
    ports:
      # SECURITY: never expose Postgres to the public internet. Bound to
      # loopback only — host tools can reach it at 127.0.0.1:5543, but it is
      # unreachable from other hosts. The backend reaches it over the internal
      # compose network (host "postgres"), so this mapping is host-admin only.
      - "127.0.0.1:5543:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/backups/moneyflow_backup_20251030_211719.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./backend/db-init/02-patch.sql:/docker-entrypoint-initdb.d/02-patch.sql:ro
      - ./backend/db-init/03-organization-tables.sql:/docker-entrypoint-initdb.d/03-organization-tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-moneyflow} -d ${DATABASE_NAME:-moneyflow_dev}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mfv2-backend
    env_file:
      - ./backend/.env.docker
    environment:
      BACKUP_DIR: /data/backups
    volumes:
      - ./volumes/backups:/data/backups
      - ./volumes/blog-assets:/app/public/assets/blog
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # SECURITY: when TRUST_PROXY=true the backend trusts X-Forwarded-For /
      # X-Real-IP / CF-Connecting-IP, so it MUST sit behind a reverse proxy and
      # NOT be reachable directly from the internet. Bound to loopback: only a
      # reverse proxy running on the host (or the internal compose network) can
      # reach it. If your reverse proxy runs as another compose service on
      # "moneyflow-network", drop this mapping entirely and proxy to
      # http://backend:3000 over the internal network.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
