server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # === Security headers ===
  # HSTS is only meaningful over HTTPS; harmless over plain HTTP behind a TLS
  # terminator. Keep `always` so it is sent on error responses too.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Content-Security-Policy: defense-in-depth against XSS/clickjacking.
  # NOTE: 'unsafe-inline' is required because analytics snippets (GA/GTM/Pixel)
  # are injected as inline <script>. The primary XSS mitigation lives in the app
  # (DOMPurify + tracking-id validation in SeoInjector). The allow-listed hosts
  # below are only the analytics providers the app actually loads.
  # If the backend API is served from a different origin, add it to connect-src.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://snap.licdn.com https://s.pinimg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.facebook.com https://px.ads.linkedin.com https://ct.pinterest.com; frame-src 'self' https://www.googletagmanager.com" always;

  # Pennylane OAuth callback: Pennylane'e kayıtlı URI bu path'e geliyor.
  # Backend API'ye proxy'lenir (app.comptario.com → api backend container).
  location = /integrations/pennylane/oauth/callback {
    proxy_pass http://backend:3000/api/integrations/pennylane/oauth/callback;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA deep-link fallback: /public/quote/<id> gibi route'lar index.html'e düşer.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
